<script>
// =====================================================
// MaiNature — by Ren (Nature+Lights Edition)
// Enhancements:
//  - All blocks lit brighter (min light raised)
//  - Player can walk through wood trunks, collides with leaves
//  - Bats blocked by player-built structures
//  - Nicer animations, better art for nature/grass/tools
//  - Natural caves that spawn visibly
//  - Map discovery (fog of war overlay)
//  - Pixelated/blocky clouds
// =====================================================

const C = document.getElementById('c');
const CTX = C.getContext('2d');
CTX.imageSmoothingEnabled = false;

// ── GLOBALS ──────────────────────────────────────────
const TILE    = 20;
const WW      = 300;
const WH      = 140;
const GFX_SCALE = 2.2;
const GRAVITY   = 0.4;
const JUMP_V    = -8.5;
const MSPEED    = 3.2;
const FRICTION  = 0.80;
const AIR_F     = 0.90;
const MAX_VY    = 14;
const MAX_ENEMIES = 18;
const DAY_SPEED   = 0.00015;
const REACH_TILES = 5;
const MIN_LIGHT   = 0.35; // blocks are now visible even in caves/night

let STATE = 'intro';
let TICK  = 0;
let W = 800, H = 600;

// ── MAP DISCOVERY ─────────────────────────────────────
let DISCOVERED = null; // Uint8Array same size as WORLD
function initDiscovery(){
  DISCOVERED = new Uint8Array(WW * WH);
}
function revealAround(px, py, radius){
  const cx = Math.floor(px / TILE), cy = Math.floor(py / TILE);
  const r = radius || 12;
  for(let dy = -r; dy <= r; dy++){
    for(let dx = -r; dx <= r; dx++){
      const nx = cx+dx, ny = cy+dy;
      if(nx<0||nx>=WW||ny<0||ny>=WH) continue;
      if(dx*dx+dy*dy<=r*r) DISCOVERED[ny*WW+nx]=1;
    }
  }
}

// ── INPUT ─────────────────────────────────────────────
const KEYS = new Set();
const keysJust = new Set();
const MOUSE = {x:0, y:0, ldown:false, rdown:false, ljust:false, rjust:false};
const TOUCH_STATE = {left:false, right:false, jump:false, attack:false};
const GP = {left:false, right:false, jump:false, attack:false, jump_just:false, attack_just:false, _pj:false, _pa:false};

function pollGamepad(){
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  let gp = null;
  for(const g of gps) if(g && g.connected){ gp = g; break; }
  if(!gp){ GP.left=GP.right=GP.jump=GP.attack=false; return; }
  const ax = gp.axes[0]||0;
  GP.left   = ax < -0.3 || !!(gp.buttons[14]&&gp.buttons[14].pressed);
  GP.right  = ax >  0.3 || !!(gp.buttons[15]&&gp.buttons[15].pressed);
  const nj  = !!(gp.buttons[0]&&gp.buttons[0].pressed) || !!(gp.buttons[11]&&gp.buttons[11].pressed);
  const na  = !!(gp.buttons[2]&&gp.buttons[2].pressed) || !!(gp.buttons[7]&&gp.buttons[7].pressed);
  GP.jump_just   = nj  && !GP._pj;
  GP.attack_just = na  && !GP._pa;
  GP.jump = nj; GP.attack = na;
  GP._pj = nj; GP._pa = na;
}
let GAMEPAD_INDEX = -1;
window.addEventListener('gamepadconnected',e=>{GAMEPAD_INDEX=e.gamepad.index;showNotif('🎮 Controller connected!','#88ff88');});
window.addEventListener('gamepaddisconnected',()=>GAMEPAD_INDEX=-1);

// ── NOTIFICATIONS ──────────────────────────────────────
const NOTIFS = [];
function showNotif(msg, color='#ffcc44'){ NOTIFS.push({msg, color, t:200}); }

// ── BLOCK TYPES ───────────────────────────────────────
const AIR=0,DIRT=1,GRASS=2,STONE=3,COAL=4,IRON=5,GOLD=6,DIAMOND=7,
      WOOD=8,LEAVES=9,SAND=10,TORCH=11,COBBLE=12,PLANK=13,GRAVEL=14,
      CLAY=15,LAVA=16,WATER=17,BEDROCK=18,FLOWER_R=19,FLOWER_Y=20,
      MUSHROOM=21,TALL_GRASS=22,SAPLING=23,CACTUS=24,SNOW=25,ICE=26,
      GLASS=27,FURNACE=28,CHEST=29,CRAFTING=30,PUMPKIN=31;

// WOOD removed from SOLID so player can walk through tree trunks
const SOLID=new Set([DIRT,GRASS,STONE,COAL,IRON,GOLD,DIAMOND,LEAVES,SAND,COBBLE,
  PLANK,GRAVEL,CLAY,BEDROCK,SNOW,ICE,GLASS,FURNACE,CHEST,CRAFTING,PUMPKIN,CACTUS]);
// Separate set for what is a "built" block (bat collision)
const PLAYER_BUILT_SOLID=new Set([PLANK,COBBLE,GLASS,FURNACE,CHEST,CRAFTING,DIRT,STONE,SAND,GRAVEL,CLAY,TORCH,WOOD]);
const DECOR=new Set([TORCH,FLOWER_R,FLOWER_Y,MUSHROOM,TALL_GRASS,SAPLING]);
const LIQID=new Set([LAVA,WATER]);
// Wood is passthrough for player/enemies but still solid for bat
const WOOD_PASSTHROUGH=new Set([WOOD]);

const BHP={[DIRT]:3,[GRASS]:3,[STONE]:9,[COAL]:11,[IRON]:13,[GOLD]:15,[DIAMOND]:20,
           [WOOD]:6,[LEAVES]:2,[SAND]:3,[COBBLE]:8,[PLANK]:5,[GRAVEL]:4,[CLAY]:3,
           [BEDROCK]:99999,[SNOW]:2,[ICE]:4,[GLASS]:3,[FURNACE]:9,[CHEST]:7,
           [CRAFTING]:6,[CACTUS]:2,[PUMPKIN]:4,[TORCH]:1};

// ── WORLD DATA ─────────────────────────────────────────
let WORLD=null, WORLD_HP=null, LIGHT=null, LIGHT_DIRTY=true;
let ENTITIES=[], PARTICLES=[], DROPS=[];
let PLAYER=null;
let TIME=0.25;
let BIOME_MAP=null;
let WORLD_SEED=0, WORLD_NAME='';
// Track which blocks the player placed (for bat collision)
let PLAYER_PLACED = null; // Uint8Array, 1 = player placed

function wGet(x,y){ if(x<0||x>=WW||y<0||y>=WH) return BEDROCK; return WORLD[y*WW+x]; }
function wSet(x,y,t,playerPlaced){
  if(x<0||x>=WW||y<0||y>=WH) return;
  WORLD[y*WW+x]=t;
  WORLD_HP[y*WW+x]=t===0?0:(BHP[t]||3);
  LIGHT_DIRTY=true;
  if(PLAYER_PLACED) PLAYER_PLACED[y*WW+x]=playerPlaced?1:0;
}
function isSolid(x,y){ return SOLID.has(wGet(x,y)); }
// For bats: also solid if it's a player-placed block or wood
function isSolidForBat(x,y){
  const t=wGet(x,y);
  if(SOLID.has(t)) return true;
  if(WOOD_PASSTHROUGH.has(t)) return true; // bats can't pass through wood trunks
  if(PLAYER_PLACED && PLAYER_PLACED[y*WW+x]===1) return true;
  return false;
}

// ── NOISE ─────────────────────────────────────────────
function hash21(x,y){ let h=Math.sin(x*127.1+y*311.7)*43758.5453; return h-Math.floor(h); }
function lerp(a,b,t){ return a+t*(b-a); }
function perlin(x,y,s){
  const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const fade=t=>t*t*t*(t*(t*6-15)+10);
  const grad=(ix,iy,fx,fy)=>{const h=hash21(ix+s,iy+s*1.7);const a=h*6.28;return Math.cos(a)*fx+Math.sin(a)*fy;};
  const u=fade(xf),v=fade(yf);
  return lerp(lerp(grad(xi,yi,xf,yf),grad(xi+1,yi,xf-1,yf),u),
              lerp(grad(xi,yi+1,xf,yf+1),grad(xi+1,yi+1,xf-1,yf+1),u),v);
}
function fbm(x,y,s,oct,per){
  let t=0,a=1,f=1,m=0;
  for(let i=0;i<oct;i++){t+=perlin(x*f,y*f,s+i*100)*a;m+=a;a*=per;f*=2;}
  return t/m;
}

// ── BIOMES ───────────────────────────────────────────
const BIOME_NAMES=['Plains','Forest','Desert','Mountains','Snow','Swamp'];

// ── WORLD GENERATION ──────────────────────────────────
function generateWorld(seed, name){
  WORLD_SEED=seed; WORLD_NAME=name;
  WORLD=new Uint8Array(WW*WH);
  WORLD_HP=new Int16Array(WW*WH);
  LIGHT=new Float32Array(WW*WH);
  PLAYER_PLACED=new Uint8Array(WW*WH);
  ENTITIES=[]; PARTICLES=[]; DROPS=[]; TIME=0.25; LIGHT_DIRTY=true;
  initDiscovery();

  // Biome map
  BIOME_MAP=new Uint8Array(WW);
  for(let x=0;x<WW;x++){
    const n=fbm(x/65,0,seed+9000,3,0.5);
    BIOME_MAP[x]=Math.min(5,Math.max(0,Math.floor((n*0.5+0.5)*6)));
  }

  // Surface heights
  const surf=new Int32Array(WW);
  const baseH=Math.floor(WH*0.42);
  for(let x=0;x<WW;x++){
    const b=BIOME_MAP[x];
    let h=fbm(x/55,0,seed,5,0.55)*22;
    if(b===2) h*=0.55;
    if(b===3) h*=1.8;
    surf[x]=Math.min(WH-10,Math.max(8,baseH+Math.round(h)));
  }

  // Fill terrain
  for(let x=0;x<WW;x++){
    const b=BIOME_MAP[x], sy=surf[x];
    const surfBlock=b===2?SAND:b===4?SNOW:GRASS;
    const subBlock=b===2?SAND:b===4?SNOW:b===5?CLAY:DIRT;
    wSet(x,WH-1,BEDROCK);
    for(let y=0;y<WH;y++){
      if(y<sy) continue;
      if(y===sy){ wSet(x,y,surfBlock); }
      else if(y<sy+4){ wSet(x,y,subBlock); }
      else if(y<sy+7){ wSet(x,y,b===2?SAND:DIRT); }
      else if(y<WH-1){
        const d=y-sy, ore=hash21(x+1000,y+seed);
        let t=STONE;
        if(d>5  && ore<0.055) t=COAL;
        if(d>12 && ore<0.033) t=IRON;
        if(d>22 && ore<0.019) t=GOLD;
        if(d>35 && ore<0.011) t=DIAMOND;
        if(d>8  && ore>0.97)  t=GRAVEL;
        if(d>6  && ore>0.93&&ore<0.94) t=CLAY;
        wSet(x,y,t);
      }
    }
  }

  // Natural Caves — worm-style tunnels for interesting shapes
  // First pass: noise-based open areas
  for(let y=0;y<WH-1;y++){
    for(let x=0;x<WW;x++){
      if(y<surf[x]+7) continue;
      const cv=fbm(x/18,y/12,seed+500,3,0.5);
      const cv2=fbm(x/9,y/7,seed+300,2,0.5);
      if(cv>0.27&&cv2>0.09&&wGet(x,y)!==BEDROCK) wSet(x,y,AIR);
    }
  }
  // Second pass: worm tunnels for more natural cave systems
  const numWorms=18;
  for(let w=0;w<numWorms;w++){
    let wx=Math.floor(hash21(w*7+seed,1)*WW);
    const startY=surf[wx]+10+Math.floor(hash21(w,seed+2)*30);
    let wy=Math.min(WH-5,startY);
    let wdir=hash21(w,seed+3)*Math.PI*2;
    const wlen=40+Math.floor(hash21(w,seed+4)*60);
    for(let s2=0;s2<wlen;s2++){
      wdir+=( hash21(wx+s2,wy+seed)*2-1)*0.45;
      wx=Math.max(2,Math.min(WW-3,wx+Math.round(Math.cos(wdir)*1.2)));
      wy=Math.max(surf[wx]+5,Math.min(WH-3,wy+Math.round(Math.sin(wdir)*1.0)));
      const r=1+Math.floor(hash21(s2,w+seed)*2);
      for(let dy=-r;dy<=r;dy++){
        for(let dx=-r;dx<=r;dx++){
          if(dx*dx+dy*dy<=r*r+1){
            const nx=wx+dx,ny=wy+dy;
            if(nx>0&&nx<WW-1&&ny>surf[nx]+4&&ny<WH-1) wSet(nx,ny,AIR);
          }
        }
      }
    }
  }

  // Trees
  for(let x=2;x<WW-2;x++){
    const b=BIOME_MAP[x];
    if(b===2) continue;
    const sy=surf[x];
    if(wGet(x,sy)!==GRASS&&wGet(x,sy)!==SNOW) continue;
    const chance=b===1?0.12:b===4?0.04:b===5?0.09:0.06;
    if(hash21(x,seed+1)<chance){
      const h=4+Math.floor(hash21(x,seed+2)*5);
      placeTree(x,sy,h,b);
    }
  }

  // Cacti
  for(let x=1;x<WW-1;x++){
    if(BIOME_MAP[x]!==2) continue;
    const sy=surf[x];
    if(hash21(x,seed+3)<0.08&&wGet(x,sy)===SAND){
      const h=2+Math.floor(hash21(x,seed+4)*3);
      for(let dy=1;dy<=h;dy++) wSet(x,sy-dy,CACTUS);
    }
  }

  // Surface decorations
  for(let x=0;x<WW;x++){
    const b=BIOME_MAP[x], sy=surf[x];
    const st=wGet(x,sy);
    if(st!==GRASS&&st!==SNOW) continue;
    if(wGet(x,sy-1)!==AIR) continue;
    const r=hash21(x,seed+5);
    if(b===4){ /* snow biome stays plain */ }
    else if(b===5){
      if(r<0.09) wSet(x,sy-1,MUSHROOM);
      else if(r<0.2) wSet(x,sy-1,TALL_GRASS);
    } else {
      if(r<0.05) wSet(x,sy-1,FLOWER_R);
      else if(r<0.10) wSet(x,sy-1,FLOWER_Y);
      else if(r<0.17) wSet(x,sy-1,TALL_GRASS);
      else if(r<0.20) wSet(x,sy-1,MUSHROOM);
    }
    if(hash21(x,seed+6)<0.015&&b!==2&&b!==4) wSet(x,sy-1,PUMPKIN);
  }

  // Lava pools
  for(let x=2;x<WW-2;x++){
    for(let y=WH-25;y<WH-2;y++){
      if(wGet(x,y)===AIR&&SOLID.has(wGet(x,y+1))&&hash21(x+500,y+seed)<0.14) wSet(x,y,LAVA);
    }
  }

  computeLight();

  const cx=Math.floor(WW/2);
  let sy=0;
  for(let y=0;y<WH;y++){ if(SOLID.has(wGet(cx,y))||wGet(cx,y)===WOOD){ sy=y; break; } }
  PLAYER=makePlayer(cx*TILE,(sy-3)*TILE);
  revealAround(PLAYER.x, PLAYER.y, 14);

  for(let i=0;i<6;i++) spawnEnemy();
}

function placeTree(x,sy,h,biome){
  const lType=biome===4?SNOW:LEAVES;
  for(let dy=1;dy<=h;dy++) wSet(x,sy-dy,WOOD);
  const cr=biome===1?3:2;
  for(let ly=sy-h-cr+1;ly<=sy-h+1;ly++){
    const dist=Math.abs(ly-(sy-h));
    const r=Math.max(1,cr-dist);
    for(let lx=x-r;lx<=x+r;lx++) if(wGet(lx,ly)===AIR) wSet(lx,ly,lType);
  }
}

// ── LIGHTING ──────────────────────────────────────────
function computeLight(){
  const skyL=Math.max(MIN_LIGHT, Math.sin(TIME*Math.PI*2)*0.5+0.5);
  LIGHT.fill(0);
  for(let x=0;x<WW;x++){
    let l=skyL;
    for(let y=0;y<WH;y++){
      const t=wGet(x,y);
      // Wood trunks are passthrough for light too (partially)
      if(SOLID.has(t)&&t!==GLASS){ l=0; }
      else if(t===LEAVES||t===GLASS){ l*=0.72; }
      else if(t===WOOD){ l*=0.85; } // wood dims light slightly
      const i=y*WW+x;
      const minL=MIN_LIGHT;
      if(l>LIGHT[i]) LIGHT[i]=l;
      if(LIGHT[i]<minL) LIGHT[i]=minL;
    }
  }
  // Ensure minimum ambient light everywhere
  for(let i=0;i<WW*WH;i++){
    if(LIGHT[i]<MIN_LIGHT) LIGHT[i]=MIN_LIGHT;
  }
  // Point lights
  for(let y=0;y<WH;y++){
    for(let x=0;x<WW;x++){
      const t=wGet(x,y);
      let lv=0,lr=0;
      if(t===TORCH){lv=0.98;lr=11;}
      if(t===LAVA) {lv=1.0; lr=14;}
      if(t===FURNACE){lv=0.8;lr=8;}
      if(lv>0){
        for(let dy=-lr;dy<=lr;dy++){
          for(let dx=-lr;dx<=lr;dx++){
            const nx=x+dx,ny=y+dy;
            if(nx<0||nx>=WW||ny<0||ny>=WH) continue;
            const d=Math.sqrt(dx*dx+dy*dy);
            if(d<lr){const ll=lv*(1-d/lr);const i2=ny*WW+nx;if(ll>LIGHT[i2])LIGHT[i2]=ll;}
          }
        }
      }
    }
  }
  LIGHT_DIRTY=false;
}

// ── PLAYER ─────────────────────────────────────────────
function emp(){ return {type:'none',count:0}; }
function slot(t,n=1){ return {type:t,count:n}; }

function makePlayer(x,y){
  const hotbar=[slot('pickaxe_wood'),slot('sword_wood'),slot('axe_wood'),slot('torch',8),slot('dirt',20),emp(),emp(),emp(),emp()];
  return {
    x,y,vx:0,vy:0,w:12,h:18,onG:false,facing:1,
    hp:100,maxHp:100,hunger:20,maxHunger:20,
    animF:0,animT:0,state:'idle',
    attackT:0,selSlot:0,
    hotbar, inventory:Array.from({length:27},emp),
    craftOpen:false,invOpen:false,
    dead:false,respawnT:0,
    xp:0,level:1, invT:0,
    stepT:0 // for footstep sound timing
  };
}

// ── ENEMIES ────────────────────────────────────────────
let _eid=0;
function spawnEnemy(){
  if(!PLAYER) return;
  const night=TIME>0.58||TIME<0.05;
  const pool=night?['zombie','zombie','skeleton','bat','creeper','goblin']:['slime','spider','bat','goblin'];
  const type=pool[Math.floor(Math.random()*pool.length)];
  const side=Math.random()<0.5?-1:1;
  const dist=(18+Math.random()*10)*TILE;
  const ex=Math.max(TILE,Math.min((WW-2)*TILE,PLAYER.x+side*dist));
  const bx=Math.floor(ex/TILE);
  let ey=0;
  for(let y=0;y<WH;y++){ if(isSolid(bx,y)){ ey=(y-2)*TILE; break; } }
  const SZ={zombie:{w:13,h:19},skeleton:{w:11,h:19},bat:{w:12,h:9},slime:{w:14,h:12},spider:{w:16,h:9},creeper:{w:12,h:20},goblin:{w:11,h:15}};
  const HP={zombie:22,skeleton:18,bat:12,slime:10,spider:14,creeper:28,goblin:16};
  const sz=SZ[type]||{w:12,h:16};
  ENTITIES.push({id:_eid++,type,x:ex-sz.w/2,y:ey,vx:0,vy:0,w:sz.w,h:sz.h,
    hp:HP[type]||20,maxHp:HP[type]||20,onG:false,facing:-side,
    animF:0,animT:0,state:'idle',attackT:0,aggroT:0,dead:false,deathT:30});
}

// ── COLLISION ─────────────────────────────────────────
function resolveCollision(ent, useBatCollision){
  const solidFn = useBatCollision ? isSolidForBat : isSolid;
  ent.x+=ent.vx;
  const lx=Math.floor(ent.x/TILE),rx=Math.floor((ent.x+ent.w-1)/TILE);
  const ty=Math.floor(ent.y/TILE),by=Math.floor((ent.y+ent.h-1)/TILE);
  for(let gy=ty;gy<=by;gy++){
    if(ent.vx>0&&solidFn(rx,gy)){ent.x=rx*TILE-ent.w;ent.vx=0;break;}
    if(ent.vx<0&&solidFn(lx,gy)){ent.x=(lx+1)*TILE;ent.vx=0;break;}
  }
  ent.y+=ent.vy;
  const lx2=Math.floor(ent.x/TILE),rx2=Math.floor((ent.x+ent.w-1)/TILE);
  const ty2=Math.floor(ent.y/TILE),by2=Math.floor((ent.y+ent.h-1)/TILE);
  ent.onG=false;
  for(let gx=lx2;gx<=rx2;gx++){
    if(ent.vy>0&&solidFn(gx,by2)){ent.y=by2*TILE-ent.h;ent.vy=0;ent.onG=true;break;}
    if(ent.vy<0&&solidFn(gx,ty2)){ent.y=(ty2+1)*TILE;ent.vy=0;break;}
  }
}

// ── PARTICLES ─────────────────────────────────────────
const BLK_COLORS={[DIRT]:['#a87a50','#9a6b45'],[GRASS]:['#5faa45','#4a9a2a'],[STONE]:['#aaaaaa','#bbbbbb'],
  [COAL]:['#555','#333'],[IRON]:['#cc9999','#bb8888'],[GOLD]:['#ffcc00','#eebb00'],'default':['#aaa','#bbb']};
function spawnBlockFx(bx,by,type){
  const cs=BLK_COLORS[type]||BLK_COLORS.default;
  for(let i=0;i<12;i++){
    PARTICLES.push({x:bx*TILE+Math.random()*TILE,y:by*TILE+Math.random()*TILE,
      vx:(Math.random()-0.5)*5,vy:-(Math.random()*4+0.5),life:55,maxL:55,
      c:cs[Math.floor(Math.random()*cs.length)],sz:2+Math.random()*4,type:'block'});
  }
}
function spawnHitFx(x,y){ for(let i=0;i<8;i++) PARTICLES.push({x,y,vx:(Math.random()-0.5)*5,vy:-(Math.random()*4),life:24,maxL:24,c:'#ff4444',sz:2+Math.random()*3,type:'blood'}); }
function spawnText(x,y,msg,c){ PARTICLES.push({x,y,vx:(Math.random()-0.5)*1.5,vy:-2,life:70,maxL:70,c,sz:5,type:'text',msg}); }
function spawnLeafFx(x,y){
  for(let i=0;i<6;i++){
    const shade=['#4caa38','#3d8a2a','#2d6a1a','#5faa45'][Math.floor(Math.random()*4)];
    PARTICLES.push({x,y,vx:(Math.random()-0.5)*3,vy:-(Math.random()*2+0.5),life:60,maxL:60,c:shade,sz:2+Math.random()*3,type:'block'});
  }
}

// ── ITEMS ─────────────────────────────────────────────
const ITEM_COLORS={
  none:'transparent',dirt:'#a87a50',grass:'#5faa45',stone:'#aaaaaa',cobble:'#999',
  coal_item:'#444',iron_ore:'#cc9999',gold_ore:'#ffcc00',diamond:'#00eee0',

const TOOL_SPD={pickaxe_wood:2,pickaxe_stone:3.5,pickaxe_iron:5,pickaxe_gold:5,pickaxe_diamond:9,
  axe_wood:2.5,axe_stone:4,axe_iron:6,axe_diamond:10,shovel_wood:2,shovel_stone:3,shovel_iron:5,none:1};
const BLK_DROP={[DIRT]:'dirt',[GRASS]:'dirt',[STONE]:'cobble',[COAL]:'coal_item',[IRON]:'iron_ore',
  [GOLD]:'gold_ore',[DIAMOND]:'diamond',[WOOD]:'wood',[LEAVES]:'leaves',[SAND]:'sand',

  [CACTUS]:'stick',[PUMPKIN]:'apple',[SNOW]:'snow_ball',[ICE]:'glass'};

function isBlock(t){return ['dirt','grass','stone','cobble','sand','plank','glass','wood','torch','chest','furnace','crafting','gravel','clay','leaves'].includes(t);}
const BLK_MAP={dirt:DIRT,grass:GRASS,stone:STONE,cobble:COBBLE,sand:SAND,plank:PLANK,glass:GLASS,wood:WOOD,torch:TORCH,chest:CHEST,furnace:FURNACE,crafting:CRAFTING,gravel:GRAVEL,clay:CLAY,leaves:LEAVES};

function addItem(inv,type,count){
  for(const s of inv){if(s.type===type&&s.count<64){const a=Math.min(64-s.count,count);s.count+=a;count-=a;if(count<=0)return true;}}
  const e=inv.find(s=>s.type==='none');if(e){e.type=type;e.count=count;return true;}return false;
}
function countItem(inv,type){return inv.reduce((s,sl)=>sl.type===type?s+sl.count:s,0);}
function removeItem(inv,type,n){if(countItem(inv,type)<n)return false;let r=n;for(const sl of inv){if(sl.type===type&&r>0){const d=Math.min(sl.count,r);sl.count-=d;r-=d;if(sl.count===0)sl.type='none';}}return true;}
function getHeld(p){return p.hotbar[p.selSlot]||{type:'none',count:0};}
function allInv(p){return [...p.hotbar,...p.inventory];}

// ── RECIPES ───────────────────────────────────────────
const RECIPES=[
  {r:'plank',n:4,i:[{t:'wood',n:1}]},
  {r:'stick',n:4,i:[{t:'plank',n:2}]},
  {r:'torch',n:4,i:[{t:'coal_item',n:1},{t:'stick',n:1}]},
  {r:'crafting',n:1,i:[{t:'plank',n:4}]},
  {r:'chest',n:1,i:[{t:'plank',n:8}]},
  {r:'furnace',n:1,i:[{t:'cobble',n:8}]},
  {r:'glass',n:1,i:[{t:'sand',n:1}]},
  {r:'iron_ingot',n:1,i:[{t:'iron_ore',n:1},{t:'coal_item',n:1}]},
  {r:'gold_ingot',n:1,i:[{t:'gold_ore',n:1},{t:'coal_item',n:1}]},
  {r:'sword_wood',n:1,i:[{t:'plank',n:2},{t:'stick',n:1}]},
  {r:'sword_stone',n:1,i:[{t:'cobble',n:2},{t:'stick',n:1}]},
  {r:'sword_iron',n:1,i:[{t:'iron_ingot',n:2},{t:'stick',n:1}]},
  {r:'sword_gold',n:1,i:[{t:'gold_ingot',n:2},{t:'stick',n:1}]},
  {r:'sword_diamond',n:1,i:[{t:'diamond',n:2},{t:'stick',n:1}]},
  {r:'pickaxe_wood',n:1,i:[{t:'plank',n:3},{t:'stick',n:2}]},
  {r:'pickaxe_stone',n:1,i:[{t:'cobble',n:3},{t:'stick',n:2}]},
  {r:'pickaxe_iron',n:1,i:[{t:'iron_ingot',n:3},{t:'stick',n:2}]},
  {r:'pickaxe_gold',n:1,i:[{t:'gold_ingot',n:3},{t:'stick',n:2}]},
  {r:'pickaxe_diamond',n:1,i:[{t:'diamond',n:3},{t:'stick',n:2}]},
  {r:'axe_wood',n:1,i:[{t:'plank',n:3},{t:'stick',n:2}]},
  {r:'axe_stone',n:1,i:[{t:'cobble',n:3},{t:'stick',n:2}]},
  {r:'axe_iron',n:1,i:[{t:'iron_ingot',n:3},{t:'stick',n:2}]},
  {r:'shovel_wood',n:1,i:[{t:'plank',n:1},{t:'stick',n:2}]},
  {r:'shovel_stone',n:1,i:[{t:'cobble',n:1},{t:'stick',n:2}]},
  {r:'shovel_iron',n:1,i:[{t:'iron_ingot',n:1},{t:'stick',n:2}]},
  {r:'bread',n:2,i:[{t:'plank',n:3}]},
  {r:'arrow',n:8,i:[{t:'stick',n:1},{t:'cobble',n:1}]},
];
function canCraft(r,inv){return r.i.every(ing=>countItem(inv,ing.t)>=ing.n);}
function doCraft(r,p){
  const inv=allInv(p);
  if(!canCraft(r,inv))return;
  r.i.forEach(ing=>removeItem(inv,ing.t,ing.n));
  addItem(inv,r.r,r.n);
  p.hotbar=inv.slice(0,9);p.inventory=inv.slice(9);
  showNotif(`Crafted ${r.r.replace(/_/g,' ')} x${r.n}`,'#88ff88');
}

// ── MINING STATE ───────────────────────────────────────
let mineTarget={bx:-1,by:-1,prog:0};
let placeCooldown=0;

// ── CAMERA ─────────────────────────────────────────────
let CAM={x:0,y:0};

// ── UPDATE ─────────────────────────────────────────────
function update(){
  TICK++;
  TIME=(TIME+DAY_SPEED)%1;
  if(TICK%6===0) LIGHT_DIRTY=true;
  if(LIGHT_DIRTY) computeLight();
  pollGamepad();

  if(!PLAYER||PLAYER.dead){
    if(PLAYER?.dead){PLAYER.respawnT--;if(PLAYER.respawnT<=0)respawnPlayer();}
    return;
  }

  const p=PLAYER;
  const held=getHeld(p);
  const inv=allInv(p);

  const goL=KEYS.has('ArrowLeft')||KEYS.has('a')||KEYS.has('A')||TOUCH_STATE.left||GP.left;
  const goR=KEYS.has('ArrowRight')||KEYS.has('d')||KEYS.has('D')||TOUCH_STATE.right||GP.right;
  const doJump=KEYS.has(' ')||KEYS.has('ArrowUp')||KEYS.has('w')||KEYS.has('W')||TOUCH_STATE.jump||GP.jump_just;
  const doAtk=MOUSE.ldown||TOUCH_STATE.attack||GP.attack;

  if(goL){p.vx-=MSPEED*0.38;p.facing=-1;}
  if(goR){p.vx+=MSPEED*0.38;p.facing=1;}
  p.vx*=p.onG?FRICTION:AIR_F;
  if(Math.abs(p.vx)>MSPEED) p.vx=MSPEED*Math.sign(p.vx);
  if(doJump&&p.onG){p.vy=JUMP_V;p.onG=false;}
  p.vy+=GRAVITY;if(p.vy>MAX_VY)p.vy=MAX_VY;
  resolveCollision(p, false);

  // Reveal map as player moves
  if(TICK%8===0) revealAround(p.x+p.w/2, p.y+p.h/2, 12);

  // Animate player
  p.animT++;
  p.state=p.onG?(Math.abs(p.vx)>0.3?'walk':'idle'):(p.vy<0?'jump':'fall');
  if(p.state==='walk'&&p.animT%5===0) p.animF=(p.animF+1)%8;
  else if(p.state==='idle') p.animF=0;
  if(p.attackT>0){p.attackT--;p.state='attack';}
  if(p.invT>0) p.invT--;
  if(placeCooldown>0) placeCooldown--;

  // Pickup drops
  for(let i=DROPS.length-1;i>=0;i--){
    const d=DROPS[i];
    const dx=d.x-(p.x+p.w/2),dy=d.y-(p.y+p.h/2);
    if(Math.sqrt(dx*dx+dy*dy)<TILE*2.2){
      d.ptimer=(d.ptimer||0)+1;
      if(d.ptimer>12){
        const inv2=allInv(p);addItem(inv2,d.type,d.count);p.hotbar=inv2.slice(0,9);p.inventory=inv2.slice(9);
        DROPS.splice(i,1);
      }
    } else d.ptimer=0;
  }
  // Drop physics
  for(const d of DROPS){
    d.vy=(d.vy||0)+GRAVITY*0.4;d.y+=d.vy;
    const by2=Math.floor((d.y+5)/TILE),bx2=Math.floor(d.x/TILE);
    if(isSolid(bx2,by2)){d.y=by2*TILE-8;d.vy=0;}
    d.bobT=(d.bobT||0)+0.07;
  }

  // Hunger
  if(TICK%700===0&&p.hunger>0) p.hunger--;
  if(p.hunger<=0&&TICK%130===0&&p.hp>1) p.hp--;
  if(p.hunger>14&&TICK%200===0&&p.hp<p.maxHp) p.hp++;

  // World mouse coords
  const wMX=MOUSE.x/GFX_SCALE+CAM.x;
  const wMY=MOUSE.y/GFX_SCALE+CAM.y;
  const tbx=Math.floor(wMX/TILE),tby=Math.floor(wMY/TILE);
  const pCX=p.x+p.w/2,pCY=p.y+p.h/2;
  const reachDist=Math.sqrt(Math.pow(tbx*TILE+TILE/2-pCX,2)+Math.pow(tby*TILE+TILE/2-pCY,2))/TILE;
  const inReach=reachDist<REACH_TILES;

  if(doAtk&&!p.craftOpen&&!p.invOpen){
    let hitE=false;
    if(MOUSE.ljust||GP.attack_just){
      for(const e of ENTITIES){
        if(e.dead) continue;
        const dd=Math.sqrt(Math.pow(wMX-(e.x+e.w/2),2)+Math.pow(wMY-(e.y+e.h/2),2));
        if(dd<TILE*4){
          const dmg=TOOL_DMG[held.type]||2;
          e.hp-=dmg;spawnHitFx(e.x+e.w/2,e.y);spawnText(e.x+e.w/2,e.y,`-${dmg}`,'#ff6633');
          p.attackT=18;hitE=true;
          if(e.hp<=0&&!e.dead){
            e.dead=true;e.deathT=30;
            const xp=e.maxHp*2;p.xp+=xp;spawnText(e.x,e.y,`+${xp}XP`,'#88ff44');
            while(p.xp>=p.level*60){p.xp-=p.level*60;p.level++;p.maxHp+=10;p.hp=p.maxHp;showNotif(`Level Up! Lv.${p.level}`,'#ffcc44');}
            const loot={zombie:'meat_raw',skeleton:'arrow',bat:'stick',slime:'stick',spider:'stick',creeper:'coal_item',goblin:'gold_ore'};
            const lt=loot[e.type]||'cobble';
            DROPS.push({x:e.x+e.w/2,y:e.y,vy:-2,type:lt,count:1+Math.floor(Math.random()*2),bobT:0});
          }
          break;
        }
      }
    }
    // Mining
    if(!hitE&&inReach){
      const blk=wGet(tbx,tby);
      if(blk!==AIR&&blk!==BEDROCK&&!DECOR.has(blk)&&!LIQID.has(blk)){
        if(mineTarget.bx!==tbx||mineTarget.by!==tby) mineTarget={bx:tbx,by:tby,prog:0};
        mineTarget.prog+=TOOL_SPD[held.type]||1;
        if(mineTarget.prog>=(BHP[blk]||3)*4){
          const drop=BLK_DROP[blk];
          if(drop) DROPS.push({x:tbx*TILE+TILE/2,y:tby*TILE,vy:-2,type:drop,count:1,bobT:0});
          if(blk===LEAVES) spawnLeafFx(tbx*TILE+TILE/2, tby*TILE+TILE/2);
          else spawnBlockFx(tbx,tby,blk);
          wSet(tbx,tby,AIR,false);
          mineTarget={bx:-1,by:-1,prog:0};
        }
        p.attackT=8;
      } else if(mineTarget.bx===tbx&&mineTarget.by===tby) mineTarget={bx:-1,by:-1,prog:0};
    }
  } else if(!MOUSE.ldown) mineTarget={bx:-1,by:-1,prog:0};

  // Place block
  if(MOUSE.rjust&&inReach&&!p.craftOpen&&!p.invOpen&&placeCooldown<=0){
    const cur=wGet(tbx,tby);
    if(cur===AIR||DECOR.has(cur)){
      if(isBlock(held.type)&&held.count>0){
        const bt=BLK_MAP[held.type];
        const px1=Math.floor(p.x/TILE),px2=Math.floor((p.x+p.w-1)/TILE);
        const py1=Math.floor(p.y/TILE),py2=Math.floor((p.y+p.h-1)/TILE);
        if(!(tbx>=px1&&tbx<=px2&&tby>=py1&&tby<=py2)){
          wSet(tbx,tby,bt,true); // mark as player-placed
          held.count--;if(held.count<=0)held.type='none';placeCooldown=8;
        }
      }
    }
  }

  MOUSE.ljust=false;MOUSE.rjust=false;GP.jump_just=false;GP.attack_just=false;

  // Enemies
  ENTITIES.forEach(e=>updateEnemy(e));
  ENTITIES=ENTITIES.filter(e=>!(e.dead&&e.deathT<=0));
  if(TICK%280===0&&ENTITIES.filter(e=>!e.dead).length<MAX_ENEMIES) spawnEnemy();

  // Particles
  for(const p2 of PARTICLES){p2.x+=p2.vx;p2.y+=p2.vy;if(p2.type!=='text')p2.vy+=0.35;p2.life--;}
  PARTICLES=PARTICLES.filter(p2=>p2.life>0);

  // Camera
  const tx=p.x+p.w/2-W/(2*GFX_SCALE);
  const ty=p.y+p.h/2-H/(2*GFX_SCALE);
  CAM.x+=(tx-CAM.x)*0.12;CAM.y+=(ty-CAM.y)*0.12;
  CAM.x=Math.max(0,Math.min(WW*TILE-W/GFX_SCALE,CAM.x));
  CAM.y=Math.max(0,Math.min(WH*TILE-H/GFX_SCALE,CAM.y));
}

function updateEnemy(e){
  if(e.dead){e.deathT--;return;}
  const p=PLAYER;if(!p||p.dead)return;
  const dx=p.x-e.x,dy=p.y-e.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<14*TILE) e.aggroT=350;
  if(e.aggroT>0)e.aggroT--;
  const aggro=e.aggroT>0;
  e.animT++;if(e.animT%7===0)e.animF=(e.animF+1)%8;
  if(e.type==='bat'){
    if(aggro){e.vx+=Math.sign(dx)*0.18;e.vy+=Math.sign(dy)*0.12;}
    else{e.vx*=0.92;e.vy*=0.92;}
    e.vx=Math.max(-3.5,Math.min(3.5,e.vx));e.vy=Math.max(-3.5,Math.min(3.5,e.vy));
    // Bats use the bat-specific collision that blocks on player-built blocks
    resolveCollision(e, true);
    if(e.x<0){e.x=0;e.vx=Math.abs(e.vx);}if(e.x>(WW-1)*TILE){e.x=(WW-1)*TILE;e.vx=-Math.abs(e.vx);}
  } else {
    e.vy+=GRAVITY;if(e.vy>MAX_VY)e.vy=MAX_VY;
    if(aggro){
      const dir=Math.sign(dx);e.vx+=dir*0.22;e.facing=dir||e.facing;
      if(Math.abs(e.vx)>2.5)e.vx=2.5*Math.sign(e.vx);
      if(e.onG&&dir!==0){
        const cx=e.x+(dir>0?e.w:0)+dir*2;
        if(isSolid(Math.floor(cx/TILE),Math.floor((e.y+e.h-1)/TILE)-1))e.vy=JUMP_V*0.8;
      }
    } else e.vx*=0.85;
    e.state=Math.abs(e.vx)>0.3?'walk':'idle';
    resolveCollision(e, false);
  }
  if(dist<TILE*1.8&&!p.dead&&e.attackT<=0){
    const dmg={zombie:6,skeleton:9,bat:4,slime:3,spider:5,creeper:18,goblin:7}[e.type]||5;
    p.hp-=dmg;p.invT=35;spawnHitFx(p.x+p.w/2,p.y);spawnText(p.x+p.w/2,p.y,`-${dmg}`,'#ff6633');
    e.attackT=70;
    if(p.hp<=0){p.hp=0;p.dead=true;p.respawnT=240;showNotif('You died! Respawning...');}
  }
  if(e.attackT>0)e.attackT--;
}

function respawnPlayer(){
  const cx=Math.floor(WW/2);let sy=0;
  for(let y=0;y<WH;y++){if(isSolid(cx,y)){sy=(y-3)*TILE;break;}}
  PLAYER.x=cx*TILE;PLAYER.y=sy;PLAYER.dead=false;PLAYER.hp=PLAYER.maxHp;
  PLAYER.hunger=PLAYER.maxHunger;PLAYER.vx=0;PLAYER.vy=0;
  revealAround(PLAYER.x+PLAYER.w/2, PLAYER.y+PLAYER.h/2, 14);
}

// ── BLOCK PIXEL ART RENDERER ───────────────────────────
// light is now always at least MIN_LIGHT so blocks never go fully dark
function drawBlock(type,sx,sy,sz,light){
  if(type===AIR) return;
  const s=sz;
  // Clamp light — blocks are always visible
  const lv=Math.max(MIN_LIGHT, light);
  const dark=1-lv;

  switch(type){
    case GRASS:{
      // Layered dirt with richer color
      CTX.fillStyle='#a07850';CTX.fillRect(sx,sy+5,s,s-5);
      for(let i=0;i<s;i+=4){CTX.fillStyle=i%8<4?'#9a6b40':'#b07a55';CTX.fillRect(sx+i,sy+6,4,s-6);}
      // Grass top — thick pixel blades with variation
      const sw=Math.sin(TICK*0.04)*0.8;
      for(let i=0;i<s;i+=2){
        const h2=3+(i%6<2?2:i%6<4?1:0);
        const sway=Math.round(sw*(i%3-1));
        const gc=i%6===0?'#55cc44':i%6===2?'#44bb33':i%6===4?'#66dd55':'#3aaa28';
        CTX.fillStyle=gc;CTX.fillRect(sx+i+sway,sy,2,h2+3);
      }
      // Grass/dirt border
      CTX.fillStyle='#2e8a30';CTX.fillRect(sx,sy+4,s,2);
      CTX.fillStyle='#3aa035';CTX.fillRect(sx,sy+3,s,2);
      break;
    }
    case DIRT:{
      CTX.fillStyle='#a07850';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#8a6438';CTX.fillRect(sx+3,sy+3,3,3);CTX.fillRect(sx+s-6,sy+7,3,3);
      CTX.fillStyle='#b88858';CTX.fillRect(sx+7,sy+s-6,3,3);CTX.fillRect(sx+2,sy+s-5,3,3);
      CTX.fillStyle='#b88858';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);
      CTX.fillStyle='#7a5030';CTX.fillRect(sx+s-1,sy,1,s);CTX.fillRect(sx,sy+s-1,s,1);
      break;
    }
    case STONE:{
      CTX.fillStyle='#aaaaaa';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#909090';CTX.fillRect(sx+s/2|0,sy+2,1,s-4);CTX.fillRect(sx+2,sy+s/2|0,s-4,1);
      CTX.fillStyle='#c0c0c0';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);
      CTX.fillStyle='#787878';CTX.fillRect(sx+s-1,sy,1,s);CTX.fillRect(sx,sy+s-1,s,1);
      // Small texture speckles
      CTX.fillStyle='#999';CTX.fillRect(sx+4,sy+4,2,2);CTX.fillRect(sx+s-6,sy+s-6,2,2);
      break;
    }
    case COAL:{
      CTX.fillStyle='#aaaaaa';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#333';CTX.fillRect(sx+3,sy+3,s-6,s-6);
      CTX.fillStyle='#222';CTX.fillRect(sx+5,sy+5,s-10,s-10);
      CTX.fillStyle='#555';CTX.fillRect(sx+6,sy+6,2,2);// shine
      CTX.fillStyle='#c0c0c0';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);
      break;
    }
    case IRON:{
      CTX.fillStyle='#aaaaaa';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#ddaaaa';CTX.fillRect(sx+3,sy+3,6,6);CTX.fillRect(sx+s-9,sy+s-9,5,5);
      CTX.fillStyle='#cc8888';CTX.fillRect(sx+4,sy+4,3,3);
      CTX.fillStyle='#cccccc';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);
      break;
    }
    case GOLD:{
      CTX.fillStyle='#aaaaaa';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#ffcc00';CTX.fillRect(sx+3,sy+3,7,7);CTX.fillRect(sx+s-9,sy+4,5,5);
      CTX.fillStyle='#ffee55';CTX.fillRect(sx+4,sy+4,3,3);
      CTX.fillStyle='#cccccc';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);
      break;
    }
    case DIAMOND:{
      CTX.fillStyle='#aaaaaa';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#00cccc';CTX.fillRect(sx+3,sy+3,7,7);CTX.fillRect(sx+s-9,sy+s-9,6,6);
      CTX.fillStyle='#66ffff';CTX.fillRect(sx+4,sy+4,3,3);
      CTX.fillStyle='#cccccc';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);
      break;
    }
    case WOOD:{
      // Rich bark — horizontal grain lines + vertical center line
      CTX.fillStyle='#a07820';CTX.fillRect(sx,sy,s,s);
      for(let i=0;i<s;i+=3){
        CTX.fillStyle=i%6<3?'#8a6618':'#b08a28';
        CTX.fillRect(sx,sy+i,s,3);
      }
      // Vertical center line (bark ridge)
      CTX.fillStyle='#7a5510';CTX.fillRect(sx+s/2-1|0,sy+1,2,s-2);
      // Highlight/shadow
      CTX.fillStyle='#c0a030';CTX.fillRect(sx,sy,1,s);CTX.fillRect(sx,sy,s,1);
      CTX.fillStyle='#7a5510';CTX.fillRect(sx+s-1,sy,1,s);CTX.fillRect(sx,sy+s-1,s,1);
      break;
    }
    case LEAVES:{
      // Dense pixel leaf pattern - brighter greens
      CTX.fillStyle='#3a8a28';CTX.fillRect(sx,sy,s,s);
      for(let i=0;i<s;i+=2){
        for(let j=0;j<s;j+=2){
          const r2=hash21(sx+i+j*113, sy+j)*4|0;
          const lc=['#4caa38','#3d9a2a','#5cc044','#2d7a18'][r2];
          CTX.fillStyle=lc;CTX.fillRect(sx+i,sy+j,2,2);
        }
      }
      // Edge highlight
      CTX.fillStyle='#66cc50';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);
      CTX.fillStyle='#2a6a18';CTX.fillRect(sx+s-1,sy,1,s);CTX.fillRect(sx,sy+s-1,s,1);
      break;
    }
    case SAND:{
      CTX.fillStyle='#e4c87a';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#f4d88a';CTX.fillRect(sx,sy,s,1);
      CTX.fillStyle='#d4b86a';CTX.fillRect(sx+3,sy+5,4,2);CTX.fillRect(sx+s-7,sy+s-7,5,2);
      CTX.fillStyle='#f0d480';CTX.fillRect(sx+s-6,sy+3,4,2);
      // Sparkle
      CTX.fillStyle='#ffffc0';CTX.fillRect(sx+2,sy+2,1,1);CTX.fillRect(sx+s-3,sy+s-3,1,1);
      break;
    }
    case SNOW:{
      CTX.fillStyle='#eef4ff';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#ffffff';CTX.fillRect(sx,sy,s,1);
      for(let i=0;i<s;i+=4){CTX.fillStyle='#ddeeff';CTX.fillRect(sx+i,sy+2,2,2);}
      CTX.fillStyle='#c8d8f0';CTX.fillRect(sx,sy+s-1,s,1);
      break;
    }
    case ICE:{
      CTX.fillStyle='#aaddff';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#ccf0ff';CTX.fillRect(sx,sy,s,2);CTX.fillRect(sx,sy,2,s);
      CTX.strokeStyle='#88bbdd';CTX.lineWidth=1;
      CTX.beginPath();CTX.moveTo(sx+3,sy+3);CTX.lineTo(sx+s-3,sy+s-3);CTX.stroke();
      CTX.beginPath();CTX.moveTo(sx+s-3,sy+3);CTX.lineTo(sx+3,sy+s-3);CTX.stroke();
      break;
    }
    case COBBLE:{
      CTX.fillStyle='#999999';CTX.fillRect(sx,sy,s,s);
      const h2=s/2|0;
      CTX.fillStyle='#aaaaaa';CTX.fillRect(sx,sy,h2,h2);CTX.fillRect(sx+h2,sy+h2,h2,h2);
      CTX.fillStyle='#888888';CTX.fillRect(sx+h2,sy,h2,h2);CTX.fillRect(sx,sy+h2,h2,h2);
      CTX.fillStyle='#cccccc';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);
      CTX.fillStyle='#666';CTX.fillRect(sx+s-1,sy,1,s);CTX.fillRect(sx,sy+s-1,s,1);
      CTX.fillStyle='#555';CTX.fillRect(sx+h2-1,sy,1,s);CTX.fillRect(sx,sy+h2-1,s,1);
      break;
    }
    case PLANK:{
      CTX.fillStyle='#c09050';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#a07030';CTX.fillRect(sx+s/2|0,sy,1,s);
      CTX.fillStyle='#d0a060';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy+s/2|0,s,1);
      CTX.fillStyle='#886020';CTX.fillRect(sx+s-1,sy,1,s);CTX.fillRect(sx,sy+s-1,s,1);
      // Wood grain
      CTX.fillStyle='#aa8040';CTX.fillRect(sx+3,sy+3,1,s-6);CTX.fillRect(sx+s-4,sy+3,1,s-6);
      break;
    }
    case GRAVEL:{
      CTX.fillStyle='#aaaaaa';CTX.fillRect(sx,sy,s,s);
      for(let i=0;i<5;i++){
        const gx=(i*17+3)%s,gy=(i*11+7)%s;
        CTX.fillStyle=i%2?'#cccccc':'#888888';CTX.fillRect(sx+gx,sy+gy,4,4);
      }
      break;
    }
    case CLAY:{
      CTX.fillStyle='#c0b0b0';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#d0c0c0';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);
      CTX.fillStyle='#aaa0a0';CTX.fillRect(sx+s-1,sy,1,s);CTX.fillRect(sx,sy+s-1,s,1);
      break;
    }
    case TORCH:{
      CTX.fillStyle='#a07820';CTX.fillRect(sx+s/2-1|0,sy+5,2,s-5);
      CTX.fillStyle='#ff9900';CTX.fillRect(sx+s/2-2|0,sy,4,5);
      CTX.fillStyle='#ffdd00';CTX.fillRect(sx+s/2-1|0,sy,2,4);
      CTX.fillStyle='#ffffff';CTX.fillRect(sx+s/2|0,sy,1,2);
      // Glow halo
      CTX.globalAlpha=0.15+Math.sin(TICK*0.08)*0.05;
      CTX.fillStyle='#ffcc00';
      CTX.beginPath();CTX.arc(sx+s/2,sy+2,s,0,Math.PI*2);CTX.fill();
      CTX.globalAlpha=1;return;
    }
    case LAVA:{
      const lp=(TICK*0.04)%1;
      CTX.fillStyle='#dd5500';CTX.fillRect(sx,sy,s,s);
      for(let i=0;i<s;i+=4){
        const yoff=Math.sin(TICK*0.05+i)*3|0;
        CTX.fillStyle=`hsl(${(lp*30+10)|0},100%,${45+lp*10|0}%)`;CTX.fillRect(sx+i,sy+yoff,4,4);
      }
      CTX.fillStyle='#ff7700';CTX.fillRect(sx,sy,s,2);return;
    }
    case WATER:{
      CTX.fillStyle='rgba(30,100,255,0.55)';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='rgba(80,160,255,0.4)';CTX.fillRect(sx,sy,s,2);return;
    }
    case BEDROCK:{
      CTX.fillStyle='#444';CTX.fillRect(sx,sy,s,s);
      for(let i=0;i<4;i++){CTX.fillStyle='#555';CTX.fillRect(sx+(i*5+1)%s,sy+(i*7+2)%s,4,4);}
      CTX.fillStyle='#333';CTX.fillRect(sx+s-1,sy,1,s);CTX.fillRect(sx,sy+s-1,s,1);
      break;
    }
    case FLOWER_R:{
      CTX.fillStyle='#44aa44';CTX.fillRect(sx+s/2-1|0,sy+7,2,s-7);
      CTX.fillStyle='#ee3333';CTX.fillRect(sx+s/2-5|0,sy+2,10,4);CTX.fillRect(sx+s/2-3|0,sy,6,9);
      CTX.fillStyle='#ffee00';CTX.fillRect(sx+s/2-1|0,sy+3,3,3);
      return;
    }
    case FLOWER_Y:{
      CTX.fillStyle='#44aa44';CTX.fillRect(sx+s/2-1|0,sy+7,2,s-7);
      CTX.fillStyle='#ffdd33';CTX.fillRect(sx+s/2-5|0,sy+2,10,4);CTX.fillRect(sx+s/2-3|0,sy,6,9);
      CTX.fillStyle='#ff9900';CTX.fillRect(sx+s/2-1|0,sy+3,3,3);
      return;
    }
    case MUSHROOM:{
      CTX.fillStyle='#eeeeee';CTX.fillRect(sx+s/2-2|0,sy+8,4,s-8);
      CTX.fillStyle='#dd3333';CTX.fillRect(sx+1,sy+2,s-2,9);CTX.fillRect(sx,sy+4,s,7);
      CTX.fillStyle='#ffffff';CTX.fillRect(sx+4,sy+4,4,4);CTX.fillRect(sx+s-8,sy+5,3,3);
      return;
    }
    case TALL_GRASS:{
      const sway=Math.sin(TICK*0.04)*2|0;
      for(let i=0;i<5;i++){
        const gx=sx+1+i*4;
        const gc=i%2?'#55cc44':'#44bb33';
        CTX.fillStyle=gc;
        CTX.fillRect(gx+sway,sy+3,2,s-3);
        CTX.fillRect(gx+sway-1,sy+1,2,6);
      }
      return;
    }
    case SAPLING:{
      CTX.fillStyle='#7a5535';CTX.fillRect(sx+s/2-1|0,sy+8,2,s-8);
      CTX.fillStyle='#33882a';CTX.fillRect(sx+s/2-5|0,sy+2,10,8);
      CTX.fillStyle='#44aa33';CTX.fillRect(sx+s/2-3|0,sy,6,10);
      return;
    }
    case CACTUS:{
      CTX.fillStyle='#44882a';CTX.fillRect(sx+3,sy,s-6,s);
      CTX.fillStyle='#33661f';CTX.fillRect(sx,sy+s/3|0,3,3);CTX.fillRect(sx+s-3,sy+s/2|0,3,3);
      CTX.fillStyle='#66aa44';CTX.fillRect(sx+4,sy+1,s-8,s-2);
      // Spikes
      CTX.fillStyle='#eedd99';CTX.fillRect(sx+2,sy+s/3|0-1,2,1);CTX.fillRect(sx+s-4,sy+s/2|0-1,2,1);
      break;
    }
    case PUMPKIN:{
      CTX.fillStyle='#ee6611';CTX.fillRect(sx,sy,s,s);
      for(let i=2;i<s;i+=s/3|0){CTX.fillStyle='#cc4400';CTX.fillRect(sx+i,sy+1,1,s-2);}
      CTX.fillStyle='#1a1a1a';CTX.fillRect(sx+3,sy+4,3,3);CTX.fillRect(sx+s-6,sy+4,3,3);
      CTX.fillRect(sx+4,sy+9,s-8,4);CTX.fillStyle='#ee6611';CTX.fillRect(sx+5,sy+10,s-10,2);
      CTX.fillStyle='#44881a';CTX.fillRect(sx+s/2-1|0,sy-3,2,4);
      break;
    }
    case GLASS:{
      CTX.fillStyle='rgba(160,220,255,0.25)';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='rgba(255,255,255,0.7)';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);
      CTX.fillStyle='rgba(160,220,255,0.5)';CTX.fillRect(sx+3,sy+3,s-6,s-6);return;
    }
    case FURNACE:{
      CTX.fillStyle='#999';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#666';CTX.fillRect(sx+2,sy+2,s-4,s-4);
      CTX.fillStyle='#333';CTX.fillRect(sx+4,sy+6,s-8,s-10);
      if(TICK%20<10){CTX.fillStyle='rgba(255,140,0,0.65)';CTX.fillRect(sx+4,sy+6,s-8,s-10);}
      CTX.fillStyle='#cccccc';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);break;
    }
    case CHEST:{
      CTX.fillStyle='#aa7030';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#8a5018';CTX.fillRect(sx,sy,s,s/2|0);
      CTX.fillStyle='#ee9944';CTX.fillRect(sx+2,sy+s/2-1|0,s-4,3);
      CTX.fillStyle='#ffdd55';CTX.fillRect(sx+s/2-2|0,sy+s/2-3|0,5,7);
      CTX.fillStyle='#c07840';CTX.fillRect(sx,sy,s,1);CTX.fillRect(sx,sy,1,s);break;
    }
    case CRAFTING:{
      CTX.fillStyle='#7a4a18';CTX.fillRect(sx,sy,s,s);
      CTX.fillStyle='#9a7030';CTX.fillRect(sx+2,sy+2,s-4,s-4);
      CTX.fillStyle='#4a2800';
      CTX.fillRect(sx+3,sy+3,5,5);CTX.fillRect(sx+s-8,sy+3,5,5);
      CTX.fillRect(sx+3,sy+s-8,5,5);CTX.fillRect(sx+s-8,sy+s-8,5,5);break;
    }
    default: CTX.fillStyle='#aaa';CTX.fillRect(sx,sy,s,s);
  }
  // Darkness overlay — much lighter now
  if(dark>0.01){CTX.fillStyle=`rgba(0,0,0,${Math.min(0.65,dark*0.8).toFixed(2)})`;CTX.fillRect(sx,sy,s,s);}
}

// ── PLAYER PIXEL ART ───────────────────────────────────
function drawPlayer(p,sx,sy){
  const s=GFX_SCALE;
  const inv=p.invT>0&&Math.floor(p.invT/3)%2===0;
  if(inv) CTX.globalAlpha=0.45;

  // Shadow
  CTX.fillStyle='rgba(0,0,0,0.22)';
  CTX.beginPath();CTX.ellipse(sx+p.w*s/2,sy+p.h*s,p.w*s/2-1,3,0,0,Math.PI*2);CTX.fill();

  const f=p.facing;
  // Enhanced walk cycle with 8 frames
  const wc=p.state==='walk'?Math.sin(p.animF*Math.PI/4)*3:0;
  const wc2=p.state==='walk'?Math.sin(p.animF*Math.PI/4+Math.PI)*2.5:0;
  const atk=p.attackT>0?Math.sin((20-p.attackT)/20*Math.PI):0;
  const bobY=p.state==='walk'?Math.abs(Math.sin(p.animF*Math.PI/4))*1.5:0;

  // Boots
  CTX.fillStyle='#3d2b1e';
  CTX.fillRect(sx+2*s,sy+15*s+wc*s,4*s,3*s);CTX.fillRect(sx+6*s,sy+15*s+wc2*s,4*s,3*s);
  CTX.fillStyle='#5a3d2a';
  CTX.fillRect(sx+2*s,sy+15*s+wc*s,4*s,1);CTX.fillRect(sx+6*s,sy+15*s+wc2*s,4*s,1);

  // Legs (pants)
  CTX.fillStyle='#2952a0';CTX.fillRect(sx+2*s,sy+10*s+wc*s-bobY,4*s,5*s);
  CTX.fillRect(sx+6*s,sy+10*s+wc2*s-bobY,4*s,5*s);
  CTX.fillStyle='#1d3d7a';
  CTX.fillRect(sx+4*s,sy+10*s+wc*s-bobY,2*s,5*s);CTX.fillRect(sx+8*s,sy+10*s+wc2*s-bobY,2*s,5*s);

  // Belt
  CTX.fillStyle='#6a3510';CTX.fillRect(sx+2*s,sy+9*s-bobY,8*s,2*s);
  CTX.fillStyle='#ffcc00';CTX.fillRect(sx+5*s,sy+9*s-bobY,2*s,2*s);
  CTX.fillStyle='#ffaa00';CTX.fillRect(sx+5*s+1,sy+9*s+0.5-bobY,1*s,1*s);

  // Body (shirt)
  CTX.fillStyle='#3a6aaa';CTX.fillRect(sx+1*s,sy+5*s-bobY,10*s,5*s);
  CTX.fillStyle='#4a7aba';CTX.fillRect(sx+1*s,sy+5*s-bobY,10*s,1*s);CTX.fillRect(sx+1*s,sy+5*s-bobY,1*s,5*s);
  CTX.fillStyle='#2a5a9a';CTX.fillRect(sx+10*s,sy+5*s-bobY,1*s,5*s);CTX.fillRect(sx+1*s,sy+9*s-bobY,10*s,1*s);
  CTX.fillStyle='#fff';
  CTX.fillRect(sx+5*s,sy+6*s-bobY,2*s,1);CTX.fillRect(sx+5*s,sy+7*s+s/2-bobY,2*s,1);

  // Arms
  const armFX=f>0?sx+9*s:sx+1*s,armBX=f>0?sx+1*s:sx+9*s;
  CTX.fillStyle='#c89868';CTX.fillRect(armBX,sy+5*s-bobY+wc*s*0.4,2*s,7*s);
  const fay=sy+5*s-atk*3*s-bobY-wc*s*0.4;
  CTX.fillStyle='#d8a878';CTX.fillRect(armFX,fay,2*s,7*s);

  // Held item
  const held=getHeld(p);
  if(held.type!=='none'){
    const hx=f>0?armFX+2*s:armFX-5*s;
    drawHeldItem(held.type,hx,fay+2*s,f,atk);
  }

  // Head
  const headBob=bobY*0.5;
  CTX.fillStyle='#d8a878';CTX.fillRect(sx+2*s,sy-headBob,8*s,7*s);
  CTX.fillStyle='#6a4010';
  CTX.fillRect(sx+2*s,sy-headBob,8*s,2*s);
  CTX.fillRect(sx+2*s,sy-headBob,2*s,4*s);
  if(f>0) CTX.fillRect(sx+8*s,sy-headBob,2*s,3*s);else CTX.fillRect(sx+2*s,sy-headBob,2*s,3*s);
  CTX.fillStyle='#c08858';
  const earX=f>0?sx+1*s:sx+9*s;
  CTX.fillRect(earX,sy+3*s-headBob,1*s,2*s);
  const eyeX=f>0?sx+6*s:sx+3*s;
  CTX.fillStyle='#1a1a2e';CTX.fillRect(eyeX,sy+3*s-headBob,2*s,2*s);
  CTX.fillStyle='#ffffff';CTX.fillRect(eyeX,sy+3*s-headBob,1,1);
  CTX.fillStyle='#b88858';CTX.fillRect(f>0?sx+7*s:sx+4*s,sy+4*s-headBob,1*s,1*s);
  CTX.fillStyle='#a87858';CTX.fillRect(f>0?sx+6*s:sx+3*s,sy+5*s-headBob,3*s,1*s);

  CTX.globalAlpha=1;
}

function drawHeldItem(type,x,y,f,swing){
  CTX.save();
  CTX.translate(x+GFX_SCALE,y+GFX_SCALE);
  CTX.rotate(f*swing*1.3);
  CTX.translate(-x-GFX_SCALE,-y-GFX_SCALE);
  const s=GFX_SCALE,c=ITEM_COLORS[type]||'#aaa';
  if(type.startsWith('sword_')){
    // Better sword art
    CTX.fillStyle=c;CTX.fillRect(x,y,2*s,8*s);
    CTX.fillStyle='#ddd';CTX.fillRect(x-1.5*s,y+2*s,5*s,s);
    CTX.fillStyle='#c0a060';CTX.fillRect(x,y+3*s,2*s,3*s);
    CTX.fillStyle='#c0a060';CTX.fillRect(x,y+6*s,2*s,1*s);
    CTX.fillStyle='rgba(255,255,255,0.4)';CTX.fillRect(x+0.5*s,y,0.5*s,6*s);
  } else if(type.startsWith('pickaxe_')){
    CTX.fillStyle='#a08030';CTX.fillRect(x,y,2*s,8*s);
    CTX.fillStyle=c;CTX.fillRect(x-3*s,y,8*s,2*s);
    CTX.fillRect(x+3.5*s,y+2*s,2*s,1.5*s);
    CTX.fillStyle='rgba(255,255,255,0.3)';CTX.fillRect(x-3*s,y,4*s,1);
  } else if(type.startsWith('axe_')){
    CTX.fillStyle='#a08030';CTX.fillRect(x,y,2*s,8*s);
    CTX.fillStyle=c;CTX.fillRect(x-3*s,y,5*s,5*s);CTX.fillRect(x-2*s,y+5*s,2*s,2*s);
    CTX.fillStyle='rgba(255,255,255,0.3)';CTX.fillRect(x-3*s,y,3*s,1);
  } else if(type.startsWith('shovel_')){
    CTX.fillStyle='#a08030';CTX.fillRect(x,y+3*s,2*s,6*s);
    CTX.fillStyle=c;CTX.fillRect(x-s,y,4*s,5*s);
    CTX.fillStyle='rgba(255,255,255,0.3)';CTX.fillRect(x-s,y,4*s,1);
  } else if(type==='torch'){
    CTX.fillStyle='#a08030';CTX.fillRect(x,y+2*s,2*s,5*s);
    CTX.fillStyle='#ff9900';CTX.fillRect(x-s,y,4*s,3*s);
    CTX.fillStyle='#ffffaa';CTX.fillRect(x,y,2*s,2*s);
  } else {
    CTX.fillStyle=c;CTX.fillRect(x,y,5*s,5*s);
    CTX.fillStyle='rgba(255,255,255,0.2)';CTX.fillRect(x,y,5*s,1);
  }
  CTX.restore();
}

// ── ENEMY PIXEL ART ────────────────────────────────────
function drawEnemy(e,sx,sy){
  if(e.dead&&e.deathT<=0) return;
  CTX.globalAlpha=e.dead?Math.max(0,e.deathT/30):1;
  const s=GFX_SCALE,f=e.facing;
  const wc=e.state==='walk'?Math.sin(e.animF*Math.PI/4)*2:0;
  const wc2=e.state==='walk'?Math.sin(e.animF*Math.PI/4+Math.PI)*2:0;

  switch(e.type){
    case 'zombie':{
      CTX.fillStyle='#1a5a1a';CTX.fillRect(sx+2*s,sy+12*s+wc*s,4*s,6*s);CTX.fillRect(sx+6*s,sy+12*s+wc2*s,4*s,6*s);
      CTX.fillStyle='#2a7a2a';CTX.fillRect(sx+1*s,sy+6*s,10*s,7*s);
      CTX.fillStyle='#3a8a3a';CTX.fillRect(sx+1*s,sy+6*s,10*s,1*s);
      CTX.fillStyle='#44a044';CTX.fillRect(sx-1*s,sy+5*s,3*s,7*s);CTX.fillRect(sx+10*s,sy+5*s,3*s,7*s);
      CTX.fillStyle='#3a8a3a';CTX.fillRect(sx+2*s,sy,8*s,7*s);
      CTX.fillStyle='#ff2222';CTX.fillRect(f>0?sx+6*s:sx+3*s,sy+2*s,2*s,2*s);
      CTX.fillStyle='#ff8888';CTX.fillRect(f>0?sx+7*s:sx+4*s,sy+2*s,1*s,1*s);
      CTX.fillStyle='#8B0000';CTX.fillRect(sx+4*s,sy+2*s,2*s,1*s);break;
    }
    case 'skeleton':{
      CTX.fillStyle='#e8e8d8';
      CTX.fillRect(sx+3*s,sy+10*s+wc*s,3*s,8*s);CTX.fillRect(sx+6*s,sy+10*s+wc2*s,3*s,8*s);
      CTX.fillRect(sx+2*s,sy+5*s,8*s,6*s);
      for(let i=0;i<3;i++){CTX.fillStyle='#a8a898';CTX.fillRect(sx+2*s,sy+(6+i*1.5|0)*s,8*s,1*s);}
      CTX.fillStyle='#e8e8d8';
      CTX.fillRect(sx,sy+5*s,2*s,6*s);CTX.fillRect(sx+10*s,sy+5*s,2*s,6*s);
      CTX.fillRect(sx+2*s,sy,8*s,7*s);
      CTX.fillStyle='#111';CTX.fillRect(f>0?sx+6*s:sx+3*s,sy+2*s,2*s,2*s);
      CTX.fillStyle='#e8e8d8';CTX.fillRect(f>0?sx+5*s:sx+2*s,sy+5*s,6*s,1*s);break;
    }
    case 'bat':{
      const flap=Math.sin(e.animF*0.9)*2.5*s;
      CTX.fillStyle='#4a1a50';
      // Better bat wings — pixelated
      CTX.fillRect(sx-6*s,sy+flap,7*s,2*s);CTX.fillRect(sx+e.w*s,sy+flap,7*s,2*s);
      CTX.fillRect(sx-4*s,sy+flap+2,3*s,3*s);CTX.fillRect(sx+e.w*s+s,sy+flap+2,3*s,3*s);
      CTX.fillRect(sx-2*s,sy+flap+4,2*s,2*s);CTX.fillRect(sx+e.w*s-s,sy+flap+4,3*s,2*s);
      CTX.fillStyle='#6a2f70';CTX.fillRect(sx+1*s,sy,e.w*s-2*s,e.h*s);
      CTX.fillStyle='#ff3333';CTX.fillRect(f>0?sx+6*s:sx+2*s,sy+2*s,2*s,2*s);
      CTX.fillStyle='#ffaaaa';CTX.fillRect(f>0?sx+7*s:sx+3*s,sy+2*s,1*s,1*s);
      // Ears
      CTX.fillStyle='#6a2f70';CTX.fillRect(sx+1*s,sy-4*s,2*s,4*s);CTX.fillRect(sx+e.w*s-3*s,sy-4*s,2*s,4*s);
      break;
    }
    case 'slime':{
      const bounce=Math.abs(Math.sin(e.animF*0.5))*2.5*s;
      CTX.fillStyle='#22bb44';CTX.fillRect(sx+s,sy+bounce,e.w*s-2*s,e.h*s-bounce);
      CTX.fillStyle='#55dd77';CTX.fillRect(sx+2*s,sy+bounce+s,e.w*s-4*s,5*s);
      CTX.fillStyle='#99ffbb';CTX.fillRect(sx+2*s,sy+bounce+s,3*s,3*s);
      CTX.fillStyle='#002200';CTX.fillRect(sx+3*s,sy+bounce+3*s,2*s,2*s);CTX.fillRect(sx+e.w*s-5*s,sy+bounce+3*s,2*s,2*s);break;
    }
    case 'spider':{
      const loff=e.animF*0.5;
      for(let i=0;i<4;i++){const lx2=sx+2*s+i*3*s,la=Math.sin(loff+i)*2.5*s;
        CTX.fillStyle='#222';CTX.fillRect(lx2,sy+4*s-la,2*s,s);CTX.fillRect(lx2-2*s,sy+4*s-la+s,2*s,s);CTX.fillRect(lx2,sy+4*s-la+s,2*s,3*s);}
      CTX.fillStyle='#2a2a2a';CTX.fillRect(sx+4*s,sy+2*s,8*s,5*s);CTX.fillRect(sx+2*s,sy+s,e.w*s-4*s,4*s);
      CTX.fillStyle='#ff0000';CTX.fillRect(f>0?sx+9*s:sx+2*s,sy+s,2*s,2*s);CTX.fillRect(f>0?sx+7*s:sx+4*s,sy+s,2*s,2*s);break;
    }
    case 'creeper':{
      CTX.fillStyle='#338838';CTX.fillRect(sx+2*s,sy+12*s+wc*s,4*s,6*s);CTX.fillRect(sx+6*s,sy+12*s+wc2*s,4*s,6*s);
      CTX.fillStyle='#449944';CTX.fillRect(sx+2*s,sy+6*s,8*s,7*s);CTX.fillRect(sx+2*s,sy+6*s,8*s,1*s);
      CTX.fillStyle='#449944';CTX.fillRect(sx+2*s,sy,8*s,7*s);
      CTX.fillStyle='#1a5a20';
      CTX.fillRect(f>0?sx+6*s:sx+2*s,sy+2*s,2*s,2*s);CTX.fillRect(f>0?sx+4*s:sx+4*s,sy+2*s,2*s,2*s);
      CTX.fillRect(sx+4*s,sy+4*s,4*s,s);CTX.fillRect(sx+4*s,sy+5*s,s,s);CTX.fillRect(sx+7*s,sy+5*s,s,s);break;
    }
    case 'goblin':{
      CTX.fillStyle='#44882a';
      CTX.fillRect(sx+2*s,sy+10*s+wc*s,3*s,5*s);CTX.fillRect(sx+6*s,sy+10*s+wc2*s,3*s,5*s);
      CTX.fillStyle='#886018';CTX.fillRect(sx+1*s,sy+5*s,9*s,6*s);
      CTX.fillStyle='#ccaa30';CTX.fillRect(sx+2*s,sy+5*s,7*s,1*s);
      CTX.fillStyle='#55aa44';CTX.fillRect(sx,sy+5*s,2*s,6*s);CTX.fillRect(sx+9*s,sy+5*s,2*s,6*s);
      const cx2=f>0?sx+10*s:sx-2*s;
      CTX.fillStyle='#886018';CTX.fillRect(cx2,sy+4*s,2*s,6*s);
      CTX.fillStyle='#aaaaaa';CTX.fillRect(cx2-s,sy+3*s,4*s,3*s);
      CTX.fillStyle='#66aa44';CTX.fillRect(sx+2*s,sy,8*s,6*s);CTX.fillRect(sx+2*s,sy,8*s,1*s);
      CTX.fillStyle='#44882a';CTX.fillRect(f>0?sx+7*s:sx+3*s,sy+3*s,2*s,2*s);
      CTX.fillStyle='#ffaa00';CTX.fillRect(f>0?sx+5*s:sx+2*s,sy+2*s,2*s,2*s);
      CTX.fillStyle='#44882a';CTX.fillRect(sx+s,sy+2*s,s,3*s);CTX.fillRect(sx+9*s,sy+2*s,s,3*s);
      break;
    }
    default:CTX.fillStyle='#cc5555';CTX.fillRect(sx,sy,e.w*s,e.h*s);
  }

  // HP bar
  if(!e.dead&&e.hp<e.maxHp){
    CTX.fillStyle='#550000';CTX.fillRect(sx,sy-5*s,e.w*s,3*s);
    CTX.fillStyle='#ee2222';CTX.fillRect(sx,sy-5*s,e.w*s*(e.hp/e.maxHp),3*s);
  }
  CTX.globalAlpha=1;
}

// ── ITEM ICON ──────────────────────────────────────────
function drawItemIcon(type,x,y,sz){
  if(!type||type==='none') return;
  const c=ITEM_COLORS[type]||'#aaa',s=sz;
  if(isBlock(type)){
    CTX.fillStyle=c;CTX.fillRect(x,y,s,s);
    CTX.fillStyle='rgba(255,255,255,0.3)';CTX.fillRect(x,y,s,2);CTX.fillRect(x,y,2,s);
    CTX.fillStyle='rgba(0,0,0,0.25)';CTX.fillRect(x+s-2,y,2,s);CTX.fillRect(x,y+s-2,s,2);
  } else if(type.startsWith('sword_')){
    CTX.fillStyle=c;CTX.fillRect(x+s/2-2,y,4,s-4);
    CTX.fillStyle='#ccc';CTX.fillRect(x,y+s*0.3,s,3);
    CTX.fillStyle='#b08030';CTX.fillRect(x+s/2-2,y+s*0.5,4,s*0.3);
    CTX.fillStyle='rgba(255,255,255,0.4)';CTX.fillRect(x+s/2-1,y,1,s-4);
  } else if(type.startsWith('pickaxe_')){
    CTX.fillStyle='#b09030';CTX.fillRect(x+s/2-1,y+5,2,s-5);
    CTX.fillStyle=c;CTX.fillRect(x,y,s,4);CTX.fillRect(x+s*0.6,y+4,s*0.35,3);
  } else if(type.startsWith('axe_')){
    CTX.fillStyle='#b09030';CTX.fillRect(x+s/2-1,y+5,2,s-5);
    CTX.fillStyle=c;CTX.fillRect(x,y,s*0.6,7);CTX.fillRect(x,y+7,s*0.35,5);
  } else if(type.startsWith('shovel_')){
    CTX.fillStyle='#b09030';CTX.fillRect(x+s/2-1,y+6,2,s-6);
    CTX.fillStyle=c;CTX.fillRect(x+s/2-3,y,6,6);
  } else if(type==='torch'){
    CTX.fillStyle='#b09030';CTX.fillRect(x+s/2-1,y+5,2,s-5);
    CTX.fillStyle='#ff9900';CTX.fillRect(x+s/2-3,y,6,6);
    CTX.fillStyle='#ffffaa';CTX.fillRect(x+s/2-1,y,2,3);
  } else if(type==='apple'){
    CTX.fillStyle='#ee4444';CTX.beginPath();CTX.arc(x+s/2,y+s/2+1,s/2-1,0,Math.PI*2);CTX.fill();
    CTX.fillStyle='#44bb44';CTX.fillRect(x+s/2-1,y,2,4);
  } else {
    CTX.fillStyle=c;CTX.fillRect(x+2,y+2,s-4,s-4);
    CTX.fillStyle='rgba(255,255,255,0.2)';CTX.fillRect(x+2,y+2,s-4,2);
  }
}

// ── SKY ───────────────────────────────────────────────
function drawSky(){
  const dp=Math.sin(TIME*Math.PI*2)*0.5+0.5;
  const r=lerp(5,145,dp)|0,g=lerp(5,210,dp)|0,b=lerp(35,240,dp)|0;
  const grad=CTX.createLinearGradient(0,0,0,H*0.7);
  grad.addColorStop(0,`rgb(${r*.7|0},${g*.7|0},${b*.9|0})`);
  grad.addColorStop(1,`rgb(${r},${g},${b})`);
  CTX.fillStyle=grad;CTX.fillRect(0,0,W,H);

  // Stars
  if(dp<0.4){
    const sa=(0.4-dp)/0.4;
    for(let i=0;i<80;i++){
      const sx2=(i*193+37)%W,sy2=(i*317+89)%(H*0.6);
      const tw=Math.sin(TICK*0.06+i)*0.5+0.5;
      CTX.globalAlpha=tw*sa*0.9;CTX.fillStyle='#fff';
      CTX.fillRect(sx2,sy2,i%7===0?2:1,i%7===0?2:1);
    }
    CTX.globalAlpha=1;
  }

  // Sun
  const sunAng=TIME*Math.PI*2-Math.PI/2;
  const sunX=W/2+Math.cos(sunAng)*W*0.38,sunY=H*0.25+Math.sin(sunAng)*H*0.28;
  if(dp>0.1){
    const sa=Math.min(1,dp*2);
    // Sun pixelated — use rects, not arcs
    CTX.globalAlpha=sa*0.15;CTX.fillStyle='#ffffa0';
    // Outer glow (pixelated circle)
    for(let dy=-7;dy<=7;dy++)for(let dx=-7;dx<=7;dx++)if(dx*dx+dy*dy<=49){CTX.fillRect(sunX+dx*6,sunY+dy*6,6,6);}
    CTX.globalAlpha=sa*0.35;CTX.fillStyle='#fff8c0';
    for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++)if(dx*dx+dy*dy<=16){CTX.fillRect(sunX+dx*5,sunY+dy*5,5,5);}
    CTX.globalAlpha=sa;CTX.fillStyle='#fff5aa';
    for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++)if(dx*dx+dy*dy<=9){CTX.fillRect(sunX+dx*4,sunY+dy*4,4,4);}
    CTX.fillStyle='#ffee88';
    for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++)if(dx*dx+dy*dy<=4){CTX.fillRect(sunX+dx*4,sunY+dy*4,4,4);}
    // Sun rays — pixelated lines
    CTX.fillStyle=`rgba(255,238,136,${sa*0.35})`;
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4+TICK*0.003;
      for(let r=26;r<42;r+=4){CTX.fillRect(sunX+Math.cos(a)*r,sunY+Math.sin(a)*r,3,3);}
    }
    CTX.globalAlpha=1;
  }
  // Moon
  if(dp<0.5){
    const ma=Math.min(1,(0.5-dp)*4);
    CTX.globalAlpha=ma*0.3;CTX.fillStyle='#ccccff';
    for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++)if(dx*dx+dy*dy<=16){CTX.fillRect(sunX+dx*5,sunY+dy*5,5,5);}
    CTX.globalAlpha=ma;CTX.fillStyle='#dde8ff';
    for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++)if(dx*dx+dy*dy<=9){CTX.fillRect(sunX+dx*4,sunY+dy*4,4,4);}
    CTX.fillStyle='#c8d8f0';
    for(let dy=-2;dy<=2;dy++)for(let dx=-1;dx<=3;dx++)if((dx-1)*(dx-1)+dy*dy<=4){CTX.fillRect(sunX+dx*4+16,sunY+dy*4-12,4,4);}
    CTX.globalAlpha=1;
  }

  // Pixelated blocky clouds
  if(dp>0.2){
    const ca=Math.min(1,(dp-0.2)/0.3)*0.88;
    CTX.globalAlpha=ca;
    for(let i=0;i<6;i++){
      const cxc=((i*220+TICK*0.15)%W+W)%W;
      const cyc=H*0.06+i*28;
      const cw=10+i*3; // width in blocks
      const ch=3+Math.floor(i/2); // height in blocks
      const blockSz=8;
      // Cloud base row
      for(let bx=0;bx<cw;bx++){
        CTX.fillStyle='rgba(255,255,255,0.92)';
        CTX.fillRect(cxc+bx*blockSz-cw*blockSz/2,cyc+ch*blockSz-blockSz,blockSz-1,blockSz-1);
      }
      // Cloud middle rows
      for(let by=0;by<ch;by++){
        const rowW=cw-(by>0?2:0);
        const rowOff=by>0?blockSz:0;
        for(let bx=0;bx<rowW;bx++){
          const shade=by===0?'rgba(240,248,255,0.95)':by===ch-1?'rgba(220,235,255,0.90)':'rgba(255,255,255,0.97)';
          CTX.fillStyle=shade;
          CTX.fillRect(cxc+bx*blockSz-rowW*blockSz/2,cyc+(ch-1-by)*blockSz-blockSz,blockSz-1,blockSz-1);
        }
      }
      // Cloud top bumps (2 bumps)
      const bumpW=Math.floor(cw*0.35);
      for(let bx=0;bx<bumpW;bx++){
        CTX.fillStyle='rgba(255,255,255,0.88)';
        CTX.fillRect(cxc+bx*blockSz-cw*blockSz*0.35,cyc-blockSz*1.5,blockSz-1,blockSz-1);
        CTX.fillRect(cxc+bx*blockSz+cw*blockSz*0.1,cyc-blockSz,blockSz-1,blockSz-1);
      }
    }
    CTX.globalAlpha=1;
  }
}

// ── WORLD DRAW ─────────────────────────────────────────
function drawWorld(){
  const sX=Math.max(0,Math.floor(CAM.x/TILE)-1);
  const eX=Math.min(WW-1,Math.ceil((CAM.x+W/GFX_SCALE)/TILE)+1);
  const sY=Math.max(0,Math.floor(CAM.y/TILE)-1);
  const eY=Math.min(WH-1,Math.ceil((CAM.y+H/GFX_SCALE)/TILE)+1);
  const SZ=Math.ceil(TILE*GFX_SCALE)+1;

  for(let by=sY;by<=eY;by++){
    for(let bx=sX;bx<=eX;bx++){
      const type=wGet(bx,by);if(type===AIR) continue;
      const sx=Math.floor((bx*TILE-CAM.x)*GFX_SCALE);
      const sy=Math.floor((by*TILE-CAM.y)*GFX_SCALE);
      const rawLight=LIGHT[by*WW+bx];
      const light=Math.max(MIN_LIGHT, rawLight);
      drawBlock(type,sx,sy,SZ,light);
    }
  }

  // Block highlight & mining progress
  if(PLAYER&&!PLAYER.dead){
    const wMX=MOUSE.x/GFX_SCALE+CAM.x,wMY=MOUSE.y/GFX_SCALE+CAM.y;
    const hbx=Math.floor(wMX/TILE),hby=Math.floor(wMY/TILE);
    const pCX=PLAYER.x+PLAYER.w/2,pCY=PLAYER.y+PLAYER.h/2;
    const dist=Math.sqrt(Math.pow(hbx*TILE+TILE/2-pCX,2)+Math.pow(hby*TILE+TILE/2-pCY,2))/TILE;
    if(dist<REACH_TILES){
      const hsx=Math.floor((hbx*TILE-CAM.x)*GFX_SCALE);
      const hsy=Math.floor((hby*TILE-CAM.y)*GFX_SCALE);
      CTX.strokeStyle='rgba(255,255,255,0.7)';CTX.lineWidth=2;CTX.strokeRect(hsx,hsy,SZ-1,SZ-1);
      if(mineTarget.bx===hbx&&mineTarget.by===hby&&mineTarget.prog>0){
        const blk=wGet(hbx,hby);
        const ratio=Math.min(1,mineTarget.prog/((BHP[blk]||3)*4));
        CTX.fillStyle=`rgba(0,0,0,${ratio*0.5})`;CTX.fillRect(hsx,hsy,SZ,SZ);
        CTX.strokeStyle=`rgba(0,0,0,${ratio})`;CTX.lineWidth=1;
        if(ratio>0.25){CTX.beginPath();CTX.moveTo(hsx+3,hsy+4);CTX.lineTo(hsx+SZ-3,hsy+SZ-2);CTX.stroke();}
        if(ratio>0.5) {CTX.beginPath();CTX.moveTo(hsx+SZ-3,hsy+4);CTX.lineTo(hsx+3,hsy+SZ-2);CTX.stroke();}
        if(ratio>0.75){CTX.beginPath();CTX.moveTo(hsx+SZ/2,hsy+2);CTX.lineTo(hsx+SZ/2,hsy+SZ-2);CTX.stroke();}
      }
    }
  }

  // Drops
  for(const d of DROPS){
    const sx=Math.floor((d.x-CAM.x)*GFX_SCALE)-8;
    const sy=Math.floor((d.y-CAM.y)*GFX_SCALE)-8+Math.sin(d.bobT)*3;
    CTX.fillStyle='rgba(255,220,80,0.25)';CTX.beginPath();CTX.arc(sx+8,sy+8,14,0,Math.PI*2);CTX.fill();
    drawItemIcon(d.type,sx,sy,16);
  }

  // Particles
  for(const p of PARTICLES){
    const px2=Math.floor((p.x-CAM.x)*GFX_SCALE),py2=Math.floor((p.y-CAM.y)*GFX_SCALE);
    CTX.globalAlpha=p.life/p.maxL;
    if(p.type==='text'){CTX.fillStyle=p.c;CTX.font=`bold ${p.sz*2|0}px monospace`;CTX.textAlign='center';CTX.fillText(p.msg,px2,py2);CTX.textAlign='left';}
    else{CTX.fillStyle=p.c;CTX.fillRect(px2-p.sz/2,py2-p.sz/2,p.sz,p.sz);}
    CTX.globalAlpha=1;
  }

  // Enemies
  for(const e of ENTITIES){
    drawEnemy(e,Math.floor((e.x-CAM.x)*GFX_SCALE),Math.floor((e.y-CAM.y)*GFX_SCALE));
  }
  // Player
  if(PLAYER&&!PLAYER.dead){
    drawPlayer(PLAYER,Math.floor((PLAYER.x-CAM.x)*GFX_SCALE),Math.floor((PLAYER.y-CAM.y)*GFX_SCALE));
  }

  // MAP DISCOVERY OVERLAY — fog of war
  drawFogOfWar();
}

// ── FOG OF WAR ─────────────────────────────────────────
function drawFogOfWar(){
  if(!DISCOVERED) return;
  const sX=Math.max(0,Math.floor(CAM.x/TILE)-1);
  const eX=Math.min(WW-1,Math.ceil((CAM.x+W/GFX_SCALE)/TILE)+1);
  const sY=Math.max(0,Math.floor(CAM.y/TILE)-1);
  const eY=Math.min(WH-1,Math.ceil((CAM.y+H/GFX_SCALE)/TILE)+1);
  const SZ=Math.ceil(TILE*GFX_SCALE)+1;

  for(let by=sY;by<=eY;by++){
    for(let bx=sX;bx<=eX;bx++){
      if(DISCOVERED[by*WW+bx]===1) continue; // fully revealed
      const sx=Math.floor((bx*TILE-CAM.x)*GFX_SCALE);
      const sy=Math.floor((by*TILE-CAM.y)*GFX_SCALE);
      // Check neighbors for partial fade
      let neighborReveal=0;
      for(let dy=-1;dy<=1;dy++){
        for(let dx=-1;dx<=1;dx++){
          const nx=bx+dx,ny=by+dy;
          if(nx>=0&&nx<WW&&ny>=0&&ny<WH&&DISCOVERED[ny*WW+nx]===1) neighborReveal++;
        }
      }
      if(neighborReveal>0){
        // Edge of fog — semi transparent
        const alpha=0.55-neighborReveal*0.06;
        CTX.fillStyle=`rgba(10,8,18,${Math.max(0.1,alpha)})`;
      } else {
        CTX.fillStyle='rgba(10,8,18,0.82)';
      }
      CTX.fillRect(sx,sy,SZ,SZ);
    }
  }
}

// ── MINIMAP ────────────────────────────────────────────
function drawMinimap(){
  if(!PLAYER||!DISCOVERED) return;
  const mmW=120,mmH=60,mmX=W-mmW-8,mmY=50;
  const scaleX=WW/mmW, scaleY=WH/mmH;
  CTX.fillStyle='rgba(0,0,0,0.7)';CTX.fillRect(mmX,mmY,mmW,mmH);
  CTX.strokeStyle='#446644';CTX.lineWidth=1;CTX.strokeRect(mmX,mmY,mmW,mmH);

  for(let my=0;my<mmH;my++){
    for(let mx=0;mx<mmW;mx++){
      const wx=Math.floor(mx*scaleX),wy=Math.floor(my*scaleY);
      if(!DISCOVERED[wy*WW+wx]) continue;
      const t=wGet(wx,wy);
      let col=null;
      if(t===GRASS) col='#4a9a30';
      else if(t===DIRT) col='#8a6030';
      else if(t===STONE) col='#888';
      else if(t===COAL) col='#333';
      else if(t===IRON) col='#cc8888';
      else if(t===GOLD) col='#ffcc00';
      else if(t===DIAMOND) col='#00cccc';
      else if(t===WOOD) col='#8a6010';
      else if(t===LEAVES) col='#338820';
      else if(t===SAND) col='#d4b86a';
      else if(t===WATER) col='#2266ff';
      else if(t===LAVA) col='#ff6600';
      else if(t===BEDROCK) col='#222';
      else if(t===AIR) col='rgba(0,0,0,0)';
      if(col) {CTX.fillStyle=col;CTX.fillRect(mmX+mx,mmY+my,1,1);}
    }
  }
  // Player dot
  const px=Math.floor(PLAYER.x/TILE/scaleX)+mmX;
  const py=Math.floor(PLAYER.y/TILE/scaleY)+mmY;
  CTX.fillStyle='#fff';CTX.fillRect(px-1,py-1,3,3);
  CTX.fillStyle='#ffcc44';CTX.fillRect(px,py,1,1);
}

// ── HUD ───────────────────────────────────────────────
function drawHUD(){
  const p=PLAYER;if(!p)return;
  // Hotbar
  const SS=44,SL=9,HBW=SL*SS+8,HBX=(W-HBW)/2,HBY=H-SS-12;
  for(let i=0;i<SL;i++){
    const sx=HBX+i*SS+4,sy=HBY;
    CTX.fillStyle=i===p.selSlot?'rgba(200,150,60,0.88)':'rgba(15,10,5,0.80)';
    CTX.fillRect(sx,sy,SS-4,SS-4);
    CTX.strokeStyle=i===p.selSlot?'#ffcc44':'#553311';
    CTX.lineWidth=i===p.selSlot?2.5:1;CTX.strokeRect(sx+.5,sy+.5,SS-5,SS-5);
    const item=p.hotbar[i];
    if(item&&item.type!=='none'){drawItemIcon(item.type,sx+7,sy+7,28);CTX.fillStyle='#fff';CTX.font='bold 9px monospace';CTX.fillText(String(item.count),sx+4,sy+SS-10);}
    CTX.fillStyle='#886644';CTX.font='8px monospace';CTX.fillText(String(i+1),sx+3,sy+12);
  }
  // HP
  CTX.fillStyle='rgba(0,0,0,0.6)';CTX.fillRect(10,H-108,148,18);
  CTX.fillStyle='#cc1111';CTX.fillRect(12,H-106,144*(p.hp/p.maxHp),14);
  CTX.fillStyle='#ff5555';CTX.fillRect(12,H-106,8,14);
  CTX.fillStyle='#fff';CTX.font='bold 11px monospace';CTX.fillText(`♥ ${p.hp}/${p.maxHp}`,18,H-95);
  // Hunger

function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return Math.abs(h)||1;}

}

// ── MAIN RENDER ────────────────────────────────────────
function render(){
  CTX.imageSmoothingEnabled=false;
  if(STATE==='intro')      drawIntro();
  else if(STATE==='menu')  drawMenu();
  else if(STATE==='worldgen') drawWorldGen();
  else if(STATE==='about') drawAbout();
  else if(STATE==='game'){
    drawSky();
    drawWorld();
    drawHUD();
    if(PLAYER&&!PLAYER.craftOpen&&!PLAYER.invOpen) drawTouchControls();
    if(PLAYER?.craftOpen) drawCraftUI();
    if(PLAYER?.invOpen) drawInventoryUI();
    if(PLAYER?.dead) drawDeathScreen();
  }
}

// ── GAME LOOP ──────────────────────────────────────────
function loop(ts){
  if(C.width!==window.innerWidth||C.height!==window.innerHeight){C.width=window.innerWidth;C.height=window.innerHeight;W=C.width;H=C.height;}
  if(STATE==='game') update();
  render();

  if(STATE==='menu'){
    if(keysJust.has('ArrowDown')||keysJust.has('s')) menuSel=(menuSel+1)%MENU_OPTS.length;
    if(keysJust.has('ArrowUp')||keysJust.has('w')) menuSel=(menuSel-1+MENU_OPTS.length)%MENU_OPTS.length;
    if(keysJust.has('Enter')||keysJust.has(' ')) doMenuSel(menuSel);
  }
  if(STATE==='worldgen') handleWGKeys();
  keysJust.clear();

  requestAnimationFrame(loop);
}

function doMenuSel(i){
  if(i===0){STATE='worldgen';wgName='My World';wgSeed='';wgFocus='name';}
  else if(i===1){if(WORLD)STATE='game';else{STATE='worldgen';wgName='My World';wgSeed='';wgFocus='name';}}
  else if(i===2) STATE='about';
}

function handleWGKeys(){
  for(const k of keysJust){
    if(k==='Enter'){startNewWorld();break;}
    if(k==='Escape'){STATE='menu';break;}
    if(k==='Tab'){wgFocus=wgFocus==='name'?'seed':'name';}
    if(wgFocus==='name'){
      if(k==='Backspace')wgName=wgName.slice(0,-1);
      else if(k.length===1&&k!=='\t'&&wgName.length<22)wgName+=k;
    } else if(wgFocus==='seed'){
      if(k==='Backspace')wgSeed=wgSeed.slice(0,-1);
      else if(/^\d$/.test(k)&&wgSeed.length<12)wgSeed+=k;
    }
  }
}

// ── EVENTS ─────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  KEYS.add(e.key);keysJust.add(e.key);
  if(STATE==='intro'){STATE='menu';return;}
  if(STATE==='about'&&e.key==='Escape'){STATE='menu';return;}
  if(STATE==='game'&&PLAYER){
    const p=PLAYER;
    if(e.key>='1'&&e.key<='9') p.selSlot=+e.key-1;
    if(e.key==='e'||e.key==='E'){p.craftOpen=!p.craftOpen;p.invOpen=false;}
    if(e.key==='i'||e.key==='I'){p.invOpen=!p.invOpen;p.craftOpen=false;}
    if(e.key==='Escape'){p.craftOpen=false;p.invOpen=false;STATE='menu';}
    if(e.key==='f'||e.key==='F'){
      const held=getHeld(p);
      const fg={apple:4,bread:8,meat_cooked:10,meat_raw:3}[held.type];
      if(fg){p.hunger=Math.min(p.maxHunger,p.hunger+fg);held.count--;if(held.count<=0)held.type='none';showNotif(`Ate ${held.type||'food'}`,'#ffcc44');}
    }
  }
  if(e.key!=='F5'&&e.key!=='F12') e.preventDefault();
},{passive:false});
window.addEventListener('keyup',e=>{KEYS.delete(e.key);},{passive:false});

C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();MOUSE.x=(e.clientX-r.left)*(C.width/r.width);MOUSE.y=(e.clientY-r.top)*(C.height/r.height);});
C.addEventListener('mousedown',e=>{
  const r=C.getBoundingClientRect();MOUSE.x=(e.clientX-r.left)*(C.width/r.width);MOUSE.y=(e.clientY-r.top)*(C.height/r.height);
  if(e.button===0){MOUSE.ldown=true;MOUSE.ljust=true;}
  if(e.button===2){MOUSE.rdown=true;MOUSE.rjust=true;}
  e.preventDefault();
  if(STATE==='intro'){STATE='menu';}
  else if(STATE==='menu'&&menuHov>=0){doMenuSel(menuHov);MOUSE.ljust=false;}
},{passive:false});
C.addEventListener('mouseup',e=>{if(e.button===0){MOUSE.ldown=false;mineTarget={bx:-1,by:-1,prog:0};}if(e.button===2)MOUSE.rdown=false;});
C.addEventListener('contextmenu',e=>e.preventDefault());
C.addEventListener('wheel',e=>{if(STATE==='game'&&PLAYER)PLAYER.selSlot=(PLAYER.selSlot+(e.deltaY>0?1:-1)+9)%9;e.preventDefault();},{passive:false});

// Touch
function getTZ(t){
  const r=C.getBoundingClientRect();
  const x=(t.clientX-r.left)*(C.width/r.width);
  const y=(t.clientY-r.top)*(C.height/r.height);
  MOUSE.x=x;MOUSE.y=y;
  if(y>H*0.65&&STATE==='game'){
    if(x<80)return 'L';if(x<150)return 'R';
    if(x>W-95&&y>H*0.72)return 'J';
    if(x>W-160&&x<W-95&&y>H*0.72)return 'A';
  }
  return 'W';
}
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const z=getTZ(t);
    if(z==='L')TOUCH_STATE.left=true;
    if(z==='R')TOUCH_STATE.right=true;
    if(z==='J'){TOUCH_STATE.jump=true;keysJust.add(' ');}
    if(z==='A'){TOUCH_STATE.attack=true;MOUSE.ldown=true;MOUSE.ljust=true;}
    if(z==='W'){MOUSE.ldown=true;MOUSE.ljust=true;}
    if(STATE==='intro')STATE='menu';
    else if(STATE==='menu'&&menuHov>=0){doMenuSel(menuHov);MOUSE.ljust=false;}
  }
},{passive:false});
C.addEventListener('touchend',e=>{
  e.preventDefault();
  TOUCH_STATE.left=false;TOUCH_STATE.right=false;TOUCH_STATE.jump=false;
  TOUCH_STATE.attack=false;MOUSE.ldown=false;mineTarget={bx:-1,by:-1,prog:0};
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const r=C.getBoundingClientRect();
    MOUSE.x=(t.clientX-r.left)*(C.width/r.width);MOUSE.y=(t.clientY-r.top)*(C.height/r.height);
  }
},{passive:false});

// ── BOOT ──────────────────────────────────────────────
W=C.width=window.innerWidth;H=C.height=window.innerHeight;
window.addEventListener('resize',()=>{W=C.width=window.innerWidth;H=C.height=window.innerHeight;});
requestAnimationFrame(loop);
</script>
